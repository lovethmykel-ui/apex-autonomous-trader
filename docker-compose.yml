version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aat_postgres
    restart: always
    environment:
      POSTGRES_USER: aat_user
      POSTGRES_PASSWORD: aat_password
      POSTGRES_DB: aat_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: aat_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: .
    container_name: aat_backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aat_user:aat_password@db:5432/aat_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  web:
    build: 
      context: ./apps/web
    container_name: aat_web_ui
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    container_name: aat_prometheus
    restart: always
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: aat_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
